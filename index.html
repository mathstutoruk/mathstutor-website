<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>mathstutor.co.uk</title>
<meta name="description" content="Mathematics tuition for GCSE and A-Level with carefully structured teaching, strong subject knowledge and high-quality lesson preparation." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
:root{
  --navy:#041b4d;
  --navy-2:#08245e;
  --gold:#d4af37;
  --gold-soft:#e0c56a;
  --cream:#f5f3ef;
  --white:#ffffff;
  --text:#23324e;
  --muted:#667387;
  --border:#e4dbce;
  --shadow:0 12px 26px rgba(0,0,0,.08);
  --container:1220px;
  --header-height:126px;
  --ink:#1f2430;
  --rednote:#c64d4d;
  --bluenote:#4f7fd4;
  --blue-tab:#d7e4f7;
  --grey-tab:#e6e6e6;
  --active-tab:#f4d2b9;
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}

body{
  margin:0;
  font-family:"Inter",sans-serif;
  background:var(--cream);
  color:var(--text);
  padding-top:var(--header-height);
}

img{display:block;max-width:100%}
a{text-decoration:none;color:inherit}

h1,h2,h3,h4{
  margin:0;
  font-family:"Cormorant Garamond",serif;
  font-weight:600;
  letter-spacing:.01em;
  color:#16244a;
}

.container{
  width:min(var(--container), calc(100% - 40px));
  margin:0 auto;
}

/* HEADER FIXED */
.site-header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:100;
  background:var(--navy);
  padding:14px 0 6px;
  transition:transform .28s ease, padding .22s ease, box-shadow .22s ease;
  box-shadow:0 1px 0 rgba(255,255,255,.04);
  overflow:visible;
}

.site-header.scrolled{
  padding:10px 0 4px;
  box-shadow:0 10px 24px rgba(0,0,0,.18);
}

.site-header.header-hidden{
  transform:translateY(-100%);
}

.header-inner{
  display:grid;
  grid-template-columns:140px 1fr;
  gap:24px;
  align-items:start;
  min-height:118px;
}

.brand{
  position:relative;
  height:120px;
  display:flex;
  align-items:flex-start;
  justify-content:flex-start;
  overflow:visible;
}

.brand img{
  width:128px;
  height:128px;
  border-radius:50%;
  object-fit:cover;
  object-position:42% 60%;
  transform:translate(-6px,14px) scale(1.06);
  box-shadow:0 14px 24px rgba(0,0,0,.22);
  background:transparent;
}

.nav-area{
  display:flex;
  justify-content:flex-end;
  padding-top:10px;
}

.nav{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:28px;
  flex-wrap:wrap;
  color:var(--white);
  font-size:14px;
  font-weight:400;
}

.nav a{
  position:relative;
  white-space:nowrap;
  padding-bottom:6px;
  opacity:.97;
  transition:color .2s ease;
}

.nav a:not(.nav-contact):not(.youtube-link)::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:-2px;
  height:2px;
  background:rgba(255,255,255,.9);
  transform:scaleX(0);
  transform-origin:left;
  transition:transform .2s ease;
}

.nav a:hover,
.nav a.active{
  color:#f0e1a7;
}

.nav a:hover::after,
.nav a.active::after{
  transform:scaleX(1);
}

.youtube-link{
  display:inline-flex;
  width:38px;
  height:38px;
  border:2px solid rgba(255,255,255,.84);
  border-radius:50%;
  align-items:center;
  justify-content:center;
}

.nav-contact{
  background:linear-gradient(180deg,var(--gold-soft),var(--gold));
  color:var(--navy);
  padding:10px 20px !important;
  border-radius:999px;
  font-weight:600;
  font-size:13px;
}

.mobile-bar,
.mobile-menu{display:none}

/* everything else unchanged from your current site */
</style>
</head>
