<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mathstutor.co.uk</title>
  <meta
    name="description"
    content="Mathematics tuition for GCSE and A-Level with carefully structured teaching, strong subject knowledge and high-quality lesson preparation."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&family=Patrick+Hand&display=swap"
    rel="stylesheet"
  >

  <style>
    :root{
      --navy:#041b4d;
      --navy-2:#08245e;
      --gold:#d4af37;
      --gold-soft:#e0c56a;
      --cream:#f5f3ef;
      --white:#ffffff;
      --text:#23324e;
      --muted:#667387;
      --border:#e4dbce;
      --shadow:0 12px 26px rgba(0,0,0,.08);
      --container:1220px;
      --header-height:118px;
      --rose:#d7a487;
      --ink:#1f2430;
      --rednote:#c64d4d;
      --bluenote:#4f7fd4;
      --blue-tab:#d7e4f7;
      --grey-tab:#e6e6e6;
      --active-tab:#f4d2b9;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:"Inter",sans-serif;
      background:var(--cream);
      color:var(--text);
      padding-top:var(--header-height);
    }

    img{display:block;max-width:100%}
    a{text-decoration:none;color:inherit}

    h1,h2,h3,h4{
      margin:0;
      font-family:"Cormorant Garamond",serif;
      font-weight:600;
      letter-spacing:.01em;
      color:#16244a;
    }

    .container{
      width:min(var(--container), calc(100% - 40px));
      margin:0 auto;
    }

    /* HEADER */
    .site-header{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:100;
      background:var(--navy);
      padding:16px 0 12px;
      transition:transform .28s ease, padding .22s ease, box-shadow .22s ease;
      box-shadow:0 1px 0 rgba(255,255,255,.04);
      overflow:visible;
    }

    .site-header.scrolled{
      padding:10px 0 8px;
      box-shadow:0 10px 24px rgba(0,0,0,.18);
    }

    .site-header.header-hidden{
      transform:translateY(-100%);
    }

    .header-inner{
      display:grid;
      grid-template-columns:140px 1fr;
      gap:24px;
      align-items:start;
    }

    .brand{
      position:relative;
      height:96px;
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
      overflow:visible;
    }

    .brand img{
      width:128px;
      height:128px;
      border-radius:50%;
      object-fit:cover;
      object-position:center;
      transform:translateY(-2px) scale(1.06);
      box-shadow:0 14px 24px rgba(0,0,0,.22);
      background:transparent;
    }

    .nav-area{
      display:flex;
      justify-content:flex-end;
      padding-top:10px;
    }

    .nav{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:28px;
      flex-wrap:wrap;
      color:var(--white);
      font-size:14px;
      font-weight:400;
    }

    .nav a{
      position:relative;
      white-space:nowrap;
      padding-bottom:6px;
      opacity:.97;
      transition:color .2s ease;
    }

    .nav a:not(.nav-contact):not(.youtube-link)::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:-2px;
      height:2px;
      background:rgba(255,255,255,.9);
      transform:scaleX(0);
      transform-origin:left;
      transition:transform .2s ease;
    }

    .nav a:not(.nav-contact):not(.youtube-link):hover,
    .nav a:not(.nav-contact):not(.youtube-link):focus-visible{
      color:#f0e1a7;
      outline:none;
    }

    .nav a:not(.nav-contact):not(.youtube-link):hover::after,
    .nav a:not(.nav-contact):not(.youtube-link):focus-visible::after,
    .nav a.active::after{
      transform:scaleX(1);
    }

    .youtube-link{
      display:inline-flex;
      width:38px;
      height:38px;
      border:2px solid rgba(255,255,255,.84);
      border-radius:50%;
      align-items:center;
      justify-content:center;
      padding-bottom:0 !important;
    }

    .youtube-link svg{
      width:18px;
      height:18px;
      fill:currentColor;
    }

    .nav-contact{
      background:linear-gradient(180deg, var(--gold-soft), var(--gold));
      color:var(--navy);
      padding:10px 20px !important;
      border-radius:999px;
      font-weight:600;
      font-size:13px;
      box-shadow:0 8px 16px rgba(0,0,0,.14);
    }

    .mobile-bar{
      display:none;
      width:100%;
      justify-content:flex-end;
      align-items:center;
      padding-top:12px;
    }

    .menu-toggle{
      width:44px;
      height:44px;
      border:none;
      border-radius:50%;
      background:transparent;
      color:var(--white);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }

    .menu-toggle svg{
      width:24px;
      height:24px;
      fill:currentColor;
    }

    .mobile-menu{
      display:none;
      width:100%;
      background:var(--navy);
      border-top:1px solid rgba(255,255,255,.08);
      padding:10px 20px 18px;
    }

    .mobile-menu.open{
      display:block;
    }

    .mobile-menu a{
      display:block;
      color:var(--white);
      padding:12px 0;
      font-size:15px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    /* HERO */
    .hero{
      background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,.07), transparent 28%),
        radial-gradient(circle at 80% 32%, rgba(255,255,255,.05), transparent 24%),
        linear-gradient(180deg, var(--navy), var(--navy-2));
      position:relative;
      overflow:hidden;
      padding:52px 0 24px;
    }

    .hero::before,
    .hero::after{
      content:"";
      position:absolute;
      left:-5%;
      right:-5%;
      height:180px;
      border-top:1px solid rgba(255,255,255,.10);
      border-radius:50%;
      pointer-events:none;
    }

    .hero::before{
      top:54px;
      transform:rotate(-6deg);
    }

    .hero::after{
      top:146px;
      transform:rotate(7deg);
    }

    .hero-inner{
      position:relative;
      z-index:1;
      text-align:center;
      color:var(--white);
    }

    .hero h1{
      color:var(--gold);
      font-size:44px;
      line-height:1.08;
      max-width:860px;
      margin:0 auto 10px;
    }

    .hero-credentials{
      color:var(--white);
      font-size:22px;
      line-height:1.42;
      max-width:900px;
      margin:0 auto 12px;
      font-family:"Cormorant Garamond",serif;
      font-weight:600;
    }

    .hero-welcome{
      color:#f4ebd9;
      font-size:30px;
      line-height:1.08;
      font-family:"Cormorant Garamond",serif;
      transform:translateY(12px);
    }

    /* SHARED */
    .section{
      padding:64px 0;
      scroll-margin-top:110px;
    }

    .section-head{
      text-align:center;
      margin-bottom:28px;
    }

    .section-head h2{
      font-size:42px;
      line-height:1.08;
      margin-bottom:8px;
    }

    .section-head p{
      max-width:760px;
      margin:0 auto;
      font-size:16px;
      line-height:1.75;
      opacity:.92;
    }

    .dark-section{
      background:var(--navy);
      color:var(--white);
    }

    .dark-section h2{
      color:var(--gold-soft);
    }

    .dark-section .section-head p{
      color:rgba(255,255,255,.92);
    }

    /* BIO INTRO */
    .bio-section{
      text-align:center;
      padding-top:10px;
    }

    .bio-photo{
      width:290px;
      max-width:100%;
      margin:0 auto 22px;
      border-radius:28px;
      box-shadow:var(--shadow);
    }

    .bio-text{
      max-width:760px;
      margin:0 auto;
      color:var(--muted);
      font-size:18px;
      line-height:1.92;
    }

    .bio-text p{
      margin:0 0 14px;
    }

    .bio-text strong{
      color:#536581;
      font-weight:600;
    }

    .bio-contact{
      display:inline-flex;
      margin-top:10px;
      background:linear-gradient(180deg, var(--gold-soft), var(--gold));
      color:var(--navy);
      padding:12px 28px;
      border-radius:999px;
      font-weight:600;
      font-size:14px;
      box-shadow:0 8px 16px rgba(0,0,0,.10);
    }

    /* LESSONS */
    .slider-wrap,
    .testimonial-wrap{
      position:relative;
    }

    .slider-outer,
    .testimonial-outer{
      overflow:hidden;
    }

    .slider-track,
    .testimonial-track{
      display:flex;
      transition:transform .35s ease;
      will-change:transform;
    }

    .slide{
      min-width:33.3333%;
      padding:0 8px;
    }

    .slide-card{
      background:transparent;
    }

    .resource-slide{
      background:#fff;
      border:1px solid #e9e9e9;
      box-shadow:0 10px 20px rgba(0,0,0,.08);
      aspect-ratio:16 / 8.7;
      position:relative;
      overflow:hidden;
      color:var(--ink);
      padding:22px 26px 34px;
    }

    .resource-title{
      font-family:"Cormorant Garamond",serif;
      font-size:28px;
      line-height:1.08;
      margin-bottom:12px;
      color:#111;
    }

    .resource-subtitle{
      font-size:13px;
      line-height:1.45;
      color:#444;
      margin-bottom:10px;
    }

    .resource-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      align-items:start;
    }

    .resource-grid.one-col{
      grid-template-columns:1fr;
    }

    .resource-text{
      font-size:12px;
      line-height:1.5;
      color:#2a2a2a;
    }

    .resource-text ul{
      margin:8px 0 0 16px;
      padding:0;
    }

    .resource-text li{
      margin:4px 0;
    }

    .formula-block{
      font-size:13px;
      line-height:1.75;
      white-space:pre-line;
      font-family:Georgia, "Times New Roman", serif;
    }

    .question-box{
      font-size:12px;
      line-height:1.45;
    }

    .question-box .qhead{
      font-weight:600;
      margin-bottom:8px;
    }

    .diagram-box{
      min-height:160px;
      border:1px solid #ececec;
      background:#fafafa;
      border-radius:6px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      overflow:hidden;
    }

    .diagram-box svg{
      width:100%;
      height:100%;
    }

    .note{
      position:absolute;
      font-family:"Patrick Hand","Comic Sans MS","Bradley Hand",cursive;
      font-size:13px;
      line-height:1;
      letter-spacing:.02em;
      transform-origin:center;
      white-space:nowrap;
      text-shadow:0 1px 0 rgba(255,255,255,.35);
    }

    .note.red{ color:var(--rednote); }
    .note.blue{ color:var(--bluenote); }
    .note.black{ color:#444; }

    .tabs-row{
      position:absolute;
      left:14px;
      right:14px;
      bottom:8px;
      display:flex;
      gap:4px;
      flex-wrap:wrap;
      align-items:center;
    }

    .tab{
      min-width:40px;
      height:16px;
      padding:0 6px;
      border-radius:4px;
      background:var(--grey-tab);
      font-size:9px;
      line-height:16px;
      text-align:center;
      color:#666;
    }

    .tab.blue{ background:var(--blue-tab); color:#55759a; }
    .tab.active{ background:var(--active-tab); color:#8a5d49; font-weight:600; }

    .slide-body{
      padding:14px 6px 0;
      color:var(--gold-soft);
      font-size:15px;
      line-height:1.5;
      text-align:center;
      font-family:"Cormorant Garamond",serif;
    }

    .slider-btn,
    .testimonial-btn{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:50px;
      height:50px;
      border:none;
      border-radius:50%;
      background:linear-gradient(180deg, var(--gold-soft), var(--gold));
      color:var(--navy);
      font-size:28px;
      cursor:pointer;
      z-index:3;
      opacity:.96;
      transition:opacity .2s ease;
    }

    .slider-btn:hover,
    .testimonial-btn:hover{
      opacity:1;
    }

    .slider-btn.inactive,
    .testimonial-btn.inactive{
      opacity:.35;
      cursor:default;
    }

    .slider-btn.prev,
    .testimonial-btn.prev{left:-8px}
    .slider-btn.next,
    .testimonial-btn.next{right:-8px}

    /* OFFER */
    .offer-grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:18px;
    }

    .offer-card{
      background:var(--white);
      border:1px solid var(--border);
      border-radius:16px;
      padding:22px;
      box-shadow:0 8px 18px rgba(0,0,0,.04);
    }

    .offer-card h3{
      font-size:22px;
      margin-bottom:10px;
    }

    .offer-card p{
      margin:0;
      color:var(--muted);
      font-size:15px;
      line-height:1.78;
    }

    /* SPLIT */
    .split{
      display:grid;
      grid-template-columns:.9fr .9fr;
      gap:34px;
      align-items:center;
      justify-content:center;
      max-width:920px;
      margin:0 auto;
    }

    .split-copy h2{
      font-size:40px;
      line-height:1.05;
      margin-bottom:14px;
      color:var(--gold);
    }

    .split-copy p{
      margin:0;
      font-size:15px;
      line-height:1.85;
      max-width:360px;
    }

    .split-image img{
      width:100%;
      max-width:280px;
      margin-left:auto;
      border-radius:8px;
      box-shadow:var(--shadow);
    }

    .map-frame{
      border-radius:8px;
      overflow:hidden;
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      background:#e8edf5;
      max-width:320px;
    }

    .map-frame iframe{
      width:100%;
      height:270px;
      border:0;
      display:block;
    }

    /* TESTIMONIALS */
    .testimonial-section{
      background:var(--navy);
      color:var(--white);
    }

    .testimonial-section h2{
      color:var(--gold-soft);
      text-align:center;
      font-size:46px;
      margin-bottom:24px;
    }

    .testimonial-slide{
      min-width:100%;
      padding:0 74px;
      text-align:center;
    }

    .testimonial-slide p{
      margin:0 auto 16px;
      max-width:900px;
      font-size:22px;
      line-height:1.72;
      font-family:"Cormorant Garamond",serif;
      color:rgba(255,255,255,.95);
      font-weight:600;
    }

    .testimonial-slide strong{
      display:block;
      font-size:15px;
      color:#e0c38a;
      font-weight:500;
    }

    /* PRICING */
    .pricing-section{
      background:var(--cream);
      padding-top:50px;
      padding-bottom:50px;
    }

    .pricing-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px;
      max-width:980px;
      margin:0 auto;
    }

    .price-card{
      border:1.5px solid #d9c59a;
      background:transparent;
      text-align:center;
      padding:18px 14px 20px;
      min-height:190px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .price-card h3{
      font-size:20px;
      line-height:1.4;
      margin-bottom:14px;
      color:#3d4a5b;
    }

    .price-value{
      font-size:16px;
      color:#6b7686;
      margin-bottom:16px;
    }

    .price-btn{
      display:inline-flex;
      align-self:center;
      background:linear-gradient(180deg, var(--gold-soft), var(--gold));
      color:var(--navy);
      padding:9px 22px;
      border-radius:999px;
      font-weight:600;
      font-size:14px;
    }

    /* FINAL */
    .final-panel{
      background:var(--navy);
      color:var(--white);
      text-align:center;
      padding:46px 20px 68px;
    }

    .final-panel h2{
      color:rgba(255,255,255,.95);
      font-size:30px;
      margin-bottom:36px;
    }

    .final-cta{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg, var(--gold-soft), var(--gold));
      color:var(--navy);
      padding:12px 28px;
      border-radius:999px;
      font-weight:600;
      font-size:14px;
      box-shadow:0 8px 16px rgba(0,0,0,.12);
    }

    .footer{
      color:rgba(255,255,255,.84);
      text-align:center;
      font-size:14px;
      margin-top:90px;
    }

    @media (max-width:1180px){
      .offer-grid{grid-template-columns:repeat(3,1fr)}
      .pricing-grid{grid-template-columns:repeat(2,1fr)}
      .slide{min-width:50%}
    }

    @media (max-width:980px){
      :root{ --header-height:132px; }

      .header-inner,
      .split{
        grid-template-columns:1fr;
      }

      .hero h1{font-size:36px}
      .hero-credentials{font-size:20px}
      .hero-welcome,
      .section-head h2,
      .split-copy h2,
      .testimonial-section h2,
      .final-panel h2{font-size:34px}

      .offer-grid,
      .pricing-grid{grid-template-columns:1fr}
      .slide{min-width:100%}
      .split-image img{margin-left:0}
    }

    @media (max-width:820px){
      :root{ --header-height:146px; }

      .header-inner{
        grid-template-columns:1fr;
        justify-items:center;
      }

      .brand{
        justify-content:center;
        height:104px;
      }

      .nav-area{
        display:none
