<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maths Tutor UK</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

html { scroll-behavior: smooth; }

body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:#f5f3ef;
  color:#16244a;
}

/* HEADER */
.header {
  background:#071f46;
  padding:30px 50px 20px;
  position:relative;
  border-bottom:2px solid #d4af37;
}

/* LOGO */
.logo {
  position:absolute;
  left:50px;
  top:-15px;
  width:180px;
  height:180px;
  border-radius:50%;
  overflow:hidden;
  box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

/* 🔥 PERFECT CENTER FIX */
.logo img {
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:50% 50%;
  transform:scale(1.75);
  border-radius:50%;
}

/* NAV */
.nav {
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:30px;
  flex-wrap:nowrap; /* 🔥 prevents breaking */
}

.nav a {
  color:white;
  text-decoration:none;
  font-weight:500;
  font-size:17px;
  white-space:nowrap; /* 🔥 prevents wrapping */
}

.cta {
  background:#d4af37;
  padding:12px 22px;
  border-radius:8px;
  font-weight:600;
  color:black;
}

/* HERO */
.hero {
  padding:80px 50px;
}

.hero-inner {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:60px;
}

.hero-text {
  max-width:600px;
}

.hero small {
  color:#6b7280;
  font-size:18px;
}

.hero h1 {
  font-size:68px;
  margin:10px 0 15px;
  line-height:1.05;
}

.hero p {
  font-size:22px;
  color:#555;
  margin-bottom:25px;
}

.hero-buttons {
  display:flex;
  gap:15px;
}

.btn {
  padding:14px 22px;
  border-radius:8px;
  font-weight:600;
}

.btn-gold {
  background:#d4af37;
  color:black;
}

.btn-outline {
  border:1px solid #ccc;
}

/* IMAGE */
.hero img {
  width:520px;
  border-radius:18px;
  box-shadow:0 15px 30px rgba(0,0,0,0.15);
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <div class="logo">
    <img src="logo.png">
  </div>

  <div class="nav">
    <a href="#">Home</a>
    <a href="#">Group Classes</a>
    <a href="#">Question Packs</a>
    <a href="#">Bio</a>
    <a href="#">Articles</a>
    <a href="#">YouTube</a>
    <a href="#">Contact</a>
    <a href="#" class="cta">Book a Lesson</a>
  </div>

</div>

<!-- HERO -->
<section class="hero">

  <div class="hero-inner">

    <div class="hero-text">
      <small>Premium online maths tuition</small>
      <h1>GCSE, A-Level & Further Maths Tuition</h1>
      <p>Clear teaching. Structured lessons. Serious results.</p>

      <div class="hero-buttons">
        <div class="btn btn-gold">Book a Lesson</div>
        <div class="btn btn-outline">Learn More</div>
      </div>
    </div>

    <img src="me.png">

  </div>

</section>

</body>
</html>
